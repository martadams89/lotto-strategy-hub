name: Update draw results

on:
  schedule:
    # 21:30 UTC after each UK draw night (Tue/Wed/Fri/Sat).
    - cron: "30 21 * * 2,3,5,6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    name: Fetch & validate latest draws
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Fetch latest official results
        run: npm run scrape

      # Critical: validate BEFORE committing. If the scrape produced anything
      # malformed, the data-integrity test fails and we never commit it.
      - name: Validate data
        run: npm test

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- public/data; then
            git add public/data
            git commit -m "chore(data): sync latest draw results [skip ci]"
            git push
            echo "Committed new draw results."
          else
            echo "No new draws."
          fi

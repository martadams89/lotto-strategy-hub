name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        id: rp
        with:
          # The default GITHUB_TOKEN never triggers workflows on the PRs it
          # opens, so the release PR's required CI check would never run and
          # auto-merge would have nothing to gate on. Use the Renovate PAT
          # instead, same as Renovate's own PRs.
          token: ${{ secrets.RENOVATE_TOKEN }}

      - name: Enable auto-merge on the release PR
        if: ${{ steps.rp.outputs.prs_created == 'true' && steps.rp.outputs.pr }}
        env:
          GH_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
        run: gh pr merge --auto --squash "${{ fromJSON(steps.rp.outputs.pr).number }}" --repo "${{ github.repository }}" || true
